name: Archive Weather Warnings

on:
  schedule:
    # 每20分钟执行一次（UTC时间）
    - cron: '*/20 * * * *'
  workflow_dispatch:   # 允许手动触发

# 防止多个运行并发写入仓库
concurrency:
  group: archive-weather
  cancel-in-progress: false

# 赋予写入仓库内容的权限
permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 3  # 防止意外卡死

    env:
      TZ: Asia/Shanghai  # 让脚本内 datetime.now() 使用北京时间

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 不再使用 actions/cache，直接依赖仓库内的 .cache/last_hash.json

      - name: 安装依赖
        run: pip install requests

      - name: 抓取并归档
        run: python scripts/fetch_and_archive.py

      - name: 提交变更
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "archive: 预警数据更新 [skip ci]"
          file_pattern: 'data/ .cache/'
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
